<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wess</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <main class="experience-shell simple-shell">
        <section class="board-stage">
          <div class="clock-strip" aria-label="Game clocks">
            <div id="white-clock" class="clock-face" data-color="w">
              <span class="clock-label">White</span>
              <strong class="clock-value">05:00</strong>
            </div>
            <div id="black-clock" class="clock-face" data-color="b">
              <span class="clock-label">Black</span>
              <strong class="clock-value">05:00</strong>
            </div>
          </div>

          <section class="board-panel">
            <div class="board-wrap">
              <div id="board" class="board" aria-label="Chess board"></div>
            </div>

            <div class="sr-only" aria-live="polite">
              <span id="status-text">White to move.</span>
              <span id="turn-badge">White</span>
              <span id="check-badge">No</span>
              <span id="move-counter">0</span>
              <span id="orientation-badge">White</span>
            </div>
          </section>
        </section>

        <button
          id="utility-backdrop"
          class="utility-backdrop"
          type="button"
          aria-label="Close utility drawer"
          tabindex="-1"
        ></button>

        <aside class="side-panel side-dock">
          <div id="utility-drawer" class="utility-drawer">
            <section
              id="session-card"
              class="card utility-panel drawer-panel"
              role="tabpanel"
              aria-labelledby="utility-tab-game"
              data-utility-panel="game"
              hidden
            >
              <div class="drawer-actions drawer-actions-pair">
                <button id="reset-button" class="primary-button" type="button">New</button>
                <button id="flip-button" class="secondary-button" type="button">Flip</button>
              </div>

              <span id="timeline-badge" class="status-chip timeline-chip">
                <span id="timeline-mode">Live</span>
                <strong id="timeline-text">0 / 0</strong>
              </span>

              <div class="segmented-row triple" role="group" aria-label="Clock preset">
                <button class="setting-button" type="button" data-clock-preset="180000">3m</button>
                <button class="setting-button" type="button" data-clock-preset="300000">5m</button>
                <button class="setting-button" type="button" data-clock-preset="600000">10m</button>
              </div>

              <div class="timeline-grid primary-controls">
                <button id="jump-start-button" class="secondary-button" type="button">Start</button>
                <button id="undo-button" class="secondary-button" type="button">Undo</button>
                <button id="redo-button" class="secondary-button" type="button">Redo</button>
                <button id="jump-end-button" class="secondary-button" type="button">End</button>
              </div>

              <div class="timeline-grid live-controls">
                <button id="replay-button" class="secondary-button" type="button">Replay</button>
                <button id="live-button" class="secondary-button" type="button">Live</button>
              </div>

              <div class="timeline-grid session-tools-grid">
                <button id="save-session-button" class="secondary-button" type="button">Save</button>
                <button id="restore-session-button" class="secondary-button" type="button">Restore</button>
              </div>

              <button id="clear-session-button" class="secondary-button wide-button" type="button">Clear</button>
              <p id="session-note" class="panel-note" hidden></p>
            </section>

            <section
              id="utility-panel-moves"
              class="card utility-panel drawer-panel"
              role="tabpanel"
              aria-labelledby="utility-tab-moves"
              data-utility-panel="moves"
              hidden
            >
              <div id="history-list" class="history-list" aria-live="polite"></div>
            </section>

            <section
              id="utility-panel-pgn"
              class="card utility-panel drawer-panel"
              role="tabpanel"
              aria-labelledby="utility-tab-pgn"
              data-utility-panel="pgn"
              hidden
            >
              <div class="drawer-actions drawer-actions-triple">
                <button id="export-pgn-button" class="secondary-button" type="button">Export</button>
                <button id="copy-pgn-button" class="secondary-button" type="button">Copy</button>
                <button id="import-pgn-button" class="primary-button" type="button">Import</button>
              </div>
              <textarea id="pgn-textarea" class="pgn-block" spellcheck="false" placeholder="PGN"></textarea>
              <p id="pgn-status" class="panel-note" hidden></p>
            </section>

            <section
              id="utility-panel-fen"
              class="card utility-panel drawer-panel"
              role="tabpanel"
              aria-labelledby="utility-tab-fen"
              data-utility-panel="fen"
              hidden
            >
              <button id="copy-fen-button" class="secondary-button" type="button">Copy</button>
              <code id="fen-text" class="fen-block"></code>
            </section>
          </div>

          <div
            id="utility-tablist"
            class="utility-tablist side-tablist"
            role="tablist"
            aria-label="Panels"
          >
            <button
              id="utility-tab-game"
              class="utility-tab side-tab"
              type="button"
              role="tab"
              aria-expanded="false"
              aria-selected="false"
              aria-controls="session-card"
              data-utility-tab="game"
            >
              Game
            </button>
            <button
              id="utility-tab-moves"
              class="utility-tab side-tab"
              type="button"
              role="tab"
              aria-expanded="false"
              aria-selected="false"
              aria-controls="utility-panel-moves"
              data-utility-tab="moves"
            >
              Moves
            </button>
            <button
              id="utility-tab-pgn"
              class="utility-tab side-tab"
              type="button"
              role="tab"
              aria-expanded="false"
              aria-selected="false"
              aria-controls="utility-panel-pgn"
              data-utility-tab="pgn"
            >
              PGN
            </button>
            <button
              id="utility-tab-fen"
              class="utility-tab side-tab"
              type="button"
              role="tab"
              aria-expanded="false"
              aria-selected="false"
              aria-controls="utility-panel-fen"
              data-utility-tab="fen"
            >
              FEN
            </button>
          </div>
        </aside>
      </main>
    </div>

    <dialog id="promotion-dialog" class="promotion-dialog">
      <div class="dialog-body">
        <p class="panel-label">Promotion</p>
        <h2 id="promotion-title">Choose a piece</h2>
        <div id="promotion-options" class="promotion-options"></div>
        <button id="promotion-cancel" class="secondary-button wide-button" type="button">Cancel</button>
      </div>
    </dialog>

    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
